# Tiny Tapeout project information
project:
  title:        "Stop the Clock"      # Project title
  author:       "Alexi del Rosario"      # Your name
  discord:      "alexijustine"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "The counter increments from zero, if player presses stop at the target value (10), the player wins."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_alexijustine_stop_the_clock"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "fulladder4.v" # 4bit ripple carry adder used by counter4.v
    - "addsub8.v" # 4bit adder and subtractor
    - "counter4.v" # 4 bit up/down counter with load and clock enable 

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "stop button"
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "count [0]"
  uo[1]: "count [1]"
  uo[2]: "count [2]"
  uo[3]: "count [3]"
  uo[4]: "win"
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
